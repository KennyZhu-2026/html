<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<title>金刚石网状结构模型</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #E9ECEF;
        user-select: none;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .container {
        width: 960px;
        height: 540px;
        position: relative;
        background: #FFFFFF;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
    }
    #mainSVG {
        width: 100%;
        height: 100%;
        display: block;
    }
    .btn {
        cursor: pointer;
        transition: all 0.2s ease;
        /* 【修复核心】确保 SVG 缩放以元素自身中心为基准 */
        transform-origin: center;
        transform-box: fill-box; 
    }
    .btn:hover {
        opacity: 0.85;
        transform: scale(1.03);
    }
    .btn:active {
        transform: scale(0.97);
    }
</style>
</head>
<body>
<div class="container">
    <svg id="mainSVG" viewBox="0 0 960 540">
        <defs>
            <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
                <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"></path>
            </pattern>
            <radialGradient id="gradNormal" cx="35%" cy="30%" r="65%">
                <stop offset="0%" stop-color="#8B9CA8"></stop>
                <stop offset="40%" stop-color="#4A5560"></stop>
                <stop offset="100%" stop-color="#1A2026"></stop>
            </radialGradient>
            <radialGradient id="gradHigh" cx="35%" cy="30%" r="65%">
                <stop offset="0%" stop-color="#FF8FA3"></stop>
                <stop offset="50%" stop-color="#E63946"></stop>
                <stop offset="100%" stop-color="#800F19"></stop>
            </radialGradient>
        </defs>

        <rect x="0" y="0" width="660" height="540" fill="#F8FAFC"></rect>
        <rect x="0" y="0" width="660" height="540" fill="url(#grid)" opacity="0.6" pointer-events="none"></rect>
        
        <g id="sceneLayer" pointer-events="none"></g>
        <g id="axisLayer" pointer-events="none"></g>

        <rect id="drawArea" x="0" y="0" width="660" height="540" fill="transparent" style="cursor: grab;"></rect>

        <g id="dashboard" transform="translate(660, 0)">
            <rect x="0" y="0" width="300" height="540" fill="#FFFFFF"></rect>
            <line x1="0" y1="0" x2="0" y2="540" stroke="#E9ECEF" stroke-width="2"></line>
            <rect x="0" y="0" width="300" height="6" fill="#E63946"></rect>
            
            <text x="25" y="55" font-size="22" font-weight="bold" fill="#343A40" letter-spacing="1">金刚石网状结构模型</text>
            <rect x="25" y="70" width="70" height="24" rx="4" fill="#457B9D" opacity="0.15"></rect>
            <text x="60" y="86" font-size="12" fill="#457B9D" font-weight="bold" text-anchor="middle">初中化学</text>
            
            <rect x="105" y="70" width="70" height="24" rx="4" fill="#2A9D8F" opacity="0.15"></rect>
            <text x="140" y="86" font-size="12" fill="#2A9D8F" font-weight="bold" text-anchor="middle">空间构型</text>

            <line x1="25" y1="110" x2="275" y2="110" stroke="#F1F3F5" stroke-width="2"></line>

            <rect x="25" y="128" width="4" height="16" fill="#E63946" rx="2"></rect>
            <text x="35" y="141" font-size="15" font-weight="bold" fill="#E63946">宏观物理性质</text>
            <text x="25" y="168" font-size="13" fill="#495057">
                <tspan x="25" dy="0">自然界中</tspan><tspan fill="#E63946" font-weight="bold">硬度最大</tspan><tspan>的物质，</tspan>
                <tspan x="25" dy="22">常被用于切割玻璃、钻探机钻头等。</tspan>
            </text>

            <rect x="25" y="218" width="4" height="16" fill="#E63946" rx="2"></rect>
            <text x="35" y="231" font-size="15" font-weight="bold" fill="#E63946">微观结构特征</text>
            
            <g transform="translate(25, 258)">
                <circle cx="6" cy="-4" r="4" fill="#457B9D"></circle>
                <text x="20" y="0" font-size="13" fill="#495057">碳原子间通过共价键紧密相连</text>
                
                <circle cx="6" cy="26" r="4" fill="#457B9D"></circle>
                <text x="20" y="30" font-size="13" fill="#495057">每个碳原子与相邻 4 个碳结合</text>

                <circle cx="6" cy="56" r="4" fill="#E63946"></circle>
                <text x="20" y="60" font-size="13" fill="#495057">核心形成致密的<tspan fill="#E63946" font-weight="bold">正四面体</tspan>构型</text>

                <circle cx="6" cy="86" r="4" fill="#457B9D"></circle>
                <text x="20" y="90" font-size="13" fill="#495057">向空间延展为坚固的立体网状结构</text>
            </g>

            <g transform="translate(25, 375)">
                <g id="btnAuto" class="btn">
                    <rect id="btnAutoBg" width="120" height="42" rx="6" fill="#457B9D"></rect>
                    <text id="btnAutoText" x="60" y="26" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">暂停旋转</text>
                </g>
            </g>
            <g transform="translate(155, 375)">
                <g id="btnHigh" class="btn">
                    <rect id="btnHighBg" width="120" height="42" rx="6" fill="#2A9D8F"></rect>
                    <text id="btnHighText" x="60" y="26" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">结构剖析</text>
                </g>
            </g>

            <rect x="25" y="435" width="250" height="85" rx="8" fill="#F8F9FA" stroke="#E9ECEF" stroke-width="1"></rect>
            <text x="40" y="458" font-size="12" fill="#ADB5BD" font-weight="bold">实时模型参数</text>
            <text x="40" y="482" font-size="12" fill="#495057">X轴旋转角: <tspan id="valAngleX" fill="#343A40" font-family="monospace" font-weight="bold">0.0°</tspan></text>
            <text x="165" y="482" font-size="12" fill="#495057">碳原子数: <tspan fill="#343A40" font-family="monospace" font-weight="bold">17</tspan></text>
            <text x="40" y="504" font-size="12" fill="#495057">Y轴旋转角: <tspan id="valAngleY" fill="#343A40" font-family="monospace" font-weight="bold">0.0°</tspan></text>
            <text x="165" y="504" font-size="12" fill="#495057">共价键数: <tspan fill="#343A40" font-family="monospace" font-weight="bold">16</tspan></text>
        </g>
    </svg>
</div>

<script>
    const baseAtoms = [
        {id:0, x:0, y:0, z:0}, 
        {id:1, x:1, y:1, z:1}, {id:2, x:1, y:-1, z:-1}, {id:3, x:-1, y:1, z:-1}, {id:4, x:-1, y:-1, z:1}, 
        {id:5, x:2, y:2, z:0}, {id:6, x:2, y:0, z:2}, {id:7, x:0, y:2, z:2}, 
        {id:8, x:2, y:-2, z:0}, {id:9, x:2, y:0, z:-2}, {id:10, x:0, y:-2, z:-2}, 
        {id:11, x:-2, y:2, z:0}, {id:12, x:-2, y:0, z:-2}, {id:13, x:0, y:2, z:-2}, 
        {id:14, x:-2, y:-2, z:0}, {id:15, x:-2, y:0, z:2}, {id:16, x:0, y:-2, z:2}  
    ];
    const SCALE = 65;
    let atoms = baseAtoms.map(a => ({...a, x: a.x*SCALE, y: a.y*SCALE, z: a.z*SCALE}));
    
    let bonds = [];
    for(let i=0; i<atoms.length; i++){
        for(let j=i+1; j<atoms.length; j++){
            let dx = atoms[i].x - atoms[j].x;
            let dy = atoms[i].y - atoms[j].y;
            let dz = atoms[i].z - atoms[j].z;
            let distSq = dx*dx + dy*dy + dz*dz;
            if(Math.abs(distSq - 3*SCALE*SCALE) < 5) {
                bonds.push({source: i, target: j});
            }
        }
    }

    const faces = [ [1, 2, 3], [1, 2, 4], [1, 3, 4], [2, 3, 4] ];

    let angleX = 0.5, angleY = 0.6;
    let isAutoRotate = true;
    let isHighlighting = false;
    let isDragging = false;
    let lastX = 0, lastY = 0;

    const CENTER_X = 330, CENTER_Y = 270;
    const PERSPECTIVE = 600;

    function rotate(x, y, z, ax, ay) {
        let cosX = Math.cos(ax), sinX = Math.sin(ax);
        let y1 = y * cosX - z * sinX;
        let z1 = y * sinX + z * cosX;
        let cosY = Math.cos(ay), sinY = Math.sin(ay);
        let x2 = x * cosY + z1 * sinY;
        let z2 = -x * sinY + z1 * cosY;
        return {x: x2, y: y1, z: z2};
    }

    function initDOM() {
        let scene = document.getElementById("sceneLayer");
        let html = "";

        bonds.forEach((b, i) => {
            html += `
            <g id="bondGrp_${i}">
                <line id="bondBg_${i}" stroke-linecap="round" />
                <line id="bondFg_${i}" stroke-linecap="round" />
            </g>`;
        });

        faces.forEach((f, i) => {
            html += `<polygon id="face_${i}" fill="#E63946" fill-opacity="0.15" stroke="#E63946" stroke-width="2" stroke-dasharray="4,4" stroke-linejoin="round" style="display:none;"/>`;
        });

        atoms.forEach((a, i) => {
            html += `
            <g id="atomGrp_${i}">
                <circle id="atomShadow_${i}" fill="#000000" />
                <circle id="atomMain_${i}" />
                ${i === 0 ? `<text id="atomLabel_0" fill="#FFF" text-anchor="middle" font-family="Arial" font-weight="bold">C</text>` : ''}
            </g>`;
        });

        scene.innerHTML = html;
    }

    function updateAxis() {
        let axisCenter = { x: 80, y: 460 };
        let len = 40;
        let axes = [
            { id: 'X', x: len, y: 0, z: 0, color: '#E63946' }, 
            { id: 'Y', x: 0, y: -len, z: 0, color: '#2A9D8F' }, 
            { id: 'Z', x: 0, y: 0, z: len, color: '#457B9D' }  
        ];
        let projectedAxes = axes.map(a => {
            let rot = rotate(a.x, a.y, a.z, angleX, angleY);
            return { 
                id: a.id, color: a.color,
                x: axisCenter.x + rot.x, y: axisCenter.y + rot.y, z: rot.z 
            };
        });
        projectedAxes.sort((a, b) => b.z - a.z);
        
        let axisLayer = document.getElementById("axisLayer");
        let h = `<circle cx="${axisCenter.x}" cy="${axisCenter.y}" r="3" fill="#343A40" opacity="0.5"/>`;
        projectedAxes.forEach(a => {
            h += `<line x1="${axisCenter.x}" y1="${axisCenter.y}" x2="${a.x}" y2="${a.y}" stroke="${a.color}" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                  <text x="${a.x + (a.x-axisCenter.x)*0.2}" y="${a.y + (a.y-axisCenter.y)*0.2 + 4}" font-size="12" fill="${a.color}" font-weight="bold" text-anchor="middle" font-family="Arial">${a.id}</text>`;
        });
        axisLayer.innerHTML = h;
    }

    function update() {
        if (isAutoRotate) {
            angleY -= 0.005;
            angleX -= 0.002;
        }

        let projectedAtoms = atoms.map(a => {
            let rot = rotate(a.x, a.y, a.z, angleX, angleY);
            let scale = PERSPECTIVE / (PERSPECTIVE + rot.z);
            return { id: a.id, x: CENTER_X + rot.x * scale, y: CENTER_Y + rot.y * scale, z: rot.z, scale: scale };
        });

        let renderItems = [];
        projectedAtoms.forEach(a => renderItems.push({ type: 'atom', z: a.z, id: a.id, data: a }));

        bonds.forEach((b, i) => {
            let p1 = projectedAtoms[b.source];
            let p2 = projectedAtoms[b.target];
            renderItems.push({ type: 'bond', z: (p1.z + p2.z) / 2, id: i, p1: p1, p2: p2, b: b });
        });

        if (isHighlighting) {
            faces.forEach((f, i) => {
                let p1 = projectedAtoms[f[0]], p2 = projectedAtoms[f[1]], p3 = projectedAtoms[f[2]];
                renderItems.push({ type: 'face', z: (p1.z + p2.z + p3.z) / 3, id: i, p1: p1, p2: p2, p3: p3 });
            });
        } else {
            faces.forEach((f, i) => {
                document.getElementById(`face_${i}`).style.display = 'none';
            });
        }

        renderItems.sort((a, b) => b.z - a.z);

        let scene = document.getElementById("sceneLayer");
        renderItems.forEach(item => {
            if (item.type === 'atom') {
                let grp = document.getElementById(`atomGrp_${item.id}`);
                scene.appendChild(grp);
                
                let a = item.data;
                let isHighlight = isHighlighting && (a.id === 0 || (a.id >= 1 && a.id <= 4));
                let isFaded = isHighlighting && !isHighlight;
                let r = 18 * a.scale;

                let shadow = document.getElementById(`atomShadow_${a.id}`);
                shadow.setAttribute("cx", a.x);
                shadow.setAttribute("cy", a.y + r*0.3);
                shadow.setAttribute("r", r * 0.9);
                shadow.setAttribute("opacity", isFaded ? 0 : 0.25);

                let circle = document.getElementById(`atomMain_${a.id}`);
                circle.setAttribute("cx", a.x);
                circle.setAttribute("cy", a.y);
                circle.setAttribute("r", r);
                circle.setAttribute("fill", isHighlight ? "url(#gradHigh)" : "url(#gradNormal)");
                
                grp.setAttribute("opacity", isFaded ? 0.15 : 1);

                if (a.id === 0) {
                    let lbl = document.getElementById("atomLabel_0");
                    lbl.setAttribute("x", a.x);
                    lbl.setAttribute("y", a.y + r * 0.35);
                    lbl.setAttribute("font-size", r * 1.1);
                }
            } 
            else if (item.type === 'bond') {
                let grp = document.getElementById(`bondGrp_${item.id}`);
                scene.appendChild(grp);
                
                let p1 = item.p1, p2 = item.p2, b = item.b;
                let isHighlight = isHighlighting && (b.source === 0 && b.target >= 1 && b.target <= 4);
                let isFaded = isHighlighting && !isHighlight;

                let baseW = 6 * ((p1.scale + p2.scale) / 2);
                let highlightW = isHighlight ? baseW * 1.3 : baseW;
                
                let bgLine = document.getElementById(`bondBg_${item.id}`);
                bgLine.setAttribute("x1", p1.x); bgLine.setAttribute("y1", p1.y);
                bgLine.setAttribute("x2", p2.x); bgLine.setAttribute("y2", p2.y);
                bgLine.setAttribute("stroke-width", highlightW);
                bgLine.setAttribute("stroke", isHighlight ? "#E63946" : "#6C757D");
                
                let fgLine = document.getElementById(`bondFg_${item.id}`);
                fgLine.setAttribute("x1", p1.x); fgLine.setAttribute("y1", p1.y);
                fgLine.setAttribute("x2", p2.x); fgLine.setAttribute("y2", p2.y);
                fgLine.setAttribute("stroke-width", highlightW * 0.4);
                fgLine.setAttribute("stroke", isHighlight ? "#F2848E" : "#ADB5BD");

                grp.setAttribute("opacity", isFaded ? 0.1 : 1);
            }
            else if (item.type === 'face') {
                let poly = document.getElementById(`face_${item.id}`);
                scene.appendChild(poly);
                poly.style.display = 'block';
                poly.setAttribute("points", `${item.p1.x},${item.p1.y} ${item.p2.x},${item.p2.y} ${item.p3.x},${item.p3.y}`);
            }
        });

        updateAxis();

        let degX = (angleX * 180 / Math.PI) % 360;
        let degY = (angleY * 180 / Math.PI) % 360;
        document.getElementById("valAngleX").textContent = (degX >= 0 ? degX : 360 + degX).toFixed(1) + "°";
        document.getElementById("valAngleY").textContent = (degY >= 0 ? degY : 360 + degY).toFixed(1) + "°";

        requestAnimationFrame(update);
    }

    let svg = document.getElementById("mainSVG");
    let drawArea = document.getElementById("drawArea");

    drawArea.addEventListener("mousedown", (e) => {
        isDragging = true;
        drawArea.style.cursor = "grabbing";
        if (isAutoRotate) toggleAuto(); 

        let pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        let svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        lastX = svgP.x;
        lastY = svgP.y;
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        let pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        let svgP = pt.matrixTransform(svg.getScreenCTM().inverse());

        let dx = svgP.x - lastX;
        let dy = svgP.y - lastY;
        angleY -= dx * 0.008; 
        angleX += dy * 0.008; 

        lastX = svgP.x;
        lastY = svgP.y;
    });

    window.addEventListener("mouseup", () => {
        if(isDragging) {
            isDragging = false;
            drawArea.style.cursor = "grab";
        }
    });

    function toggleAuto() {
        isAutoRotate = !isAutoRotate;
        document.getElementById("btnAutoBg").setAttribute("fill", isAutoRotate ? "#457B9D" : "#868E96");
        document.getElementById("btnAutoText").textContent = isAutoRotate ? "暂停旋转" : "自动旋转";
    }
    document.getElementById("btnAuto").addEventListener("click", toggleAuto);

    document.getElementById("btnHigh").addEventListener("click", () => {
        isHighlighting = !isHighlighting;
        document.getElementById("btnHighBg").setAttribute("fill", isHighlighting ? "#E63946" : "#2A9D8F");
        document.getElementById("btnHighText").textContent = isHighlighting ? "恢复全貌" : "结构剖析";
    });

    initDOM();
    update();
</script>

<div style="position: fixed; right: 10px; bottom: 10px; font-size: 11px; color: rgb(255, 255, 255); background: rgba(0, 0, 0, 0.4); padding: 3px 10px; border-radius: 20px; pointer-events: none; z-index: 99999; font-family: sans-serif; font-weight: 500; -webkit-font-smoothing: antialiased; letter-spacing: 0.2px;">帧理SVG:www.svgzhenli.cn</div></body></html>
