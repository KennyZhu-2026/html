  function sel(z, cell) {
    var el = E[z];
    if (!el) return;
    var co = C[el.tc];

    document.getElementById('panel-card-rect').setAttribute('fill', co.f);
    document.getElementById('panel-card-rect').setAttribute('stroke', co.s);
    document.getElementById('panel-Z').textContent = z;
    var sym = document.getElementById('panel-sym');
    sym.textContent = el.s;
    sym.setAttribute('fill', co.s);
    document.getElementById('panel-name').textContent = el.n;
    document.getElementById('panel-mass').textContent = el.m;

    document.getElementById('info-name').textContent = '元素名称：' + el.n + ' (' + el.s + ')';
    document.getElementById('info-type').textContent = '元素分类：' + el.t;
    document.getElementById('info-mass').textContent = '标准相对原子质量：' + el.m;
    document.getElementById('info-calc-mass').textContent = '计算常用取值：' + el.c;
    document.getElementById('info-rule').textContent = '命名规律：' + el.r;

    if (cell) {
      var r = cell.querySelector('rect');
      var hl = document.getElementById('selection-highlight');
      hl.setAttribute('x', parseFloat(r.getAttribute('x')) - 1);
      hl.setAttribute('y', parseFloat(r.getAttribute('y')) - 1);
    }
    drawBohr(z, el.sh, el.nt);
  }

  function drawBohr(z, shells, note) {
    var g = document.getElementById('bohr-group');
    while (g.firstChild) g.removeChild(g.firstChild);

    var n = shells.length;
    var nR = z >= 10 ? 18 : 16;
    var gap = 5;
    var bulge = 8;

    var shellsW = 0;
    for (var j = 0; j < n; j++) {
      var nw = shells[j] >= 10 ? 14 : 8;
      shellsW += bulge + 2 + nw;
      if (j < n - 1) shellsW += 4;
    }
    var tw = nR * 2 + gap + shellsW;
    var sx = 15 - tw / 2;
    var ncx = sx + nR;

    var nc = document.createElementNS(NS, 'circle');
    nc.setAttribute('cx', ncx);
    nc.setAttribute('cy', 0);
    nc.setAttribute('r', nR);
    nc.setAttribute('fill', '#FFFFFF');
    nc.setAttribute('stroke', '#343A40');
    nc.setAttribute('stroke-width', '1.5');
    g.appendChild(nc);

    var nt = document.createElementNS(NS, 'text');
    nt.setAttribute('x', ncx);
    nt.setAttribute('y', 5);
    nt.setAttribute('text-anchor', 'middle');
    nt.setAttribute('font-size', z >= 10 ? '11' : '12');
    nt.setAttribute('font-weight', 'bold');
    nt.setAttribute('fill', '#343A40');
    nt.textContent = '+' + z;
    g.appendChild(nt);

    var ax = sx + nR * 2 + gap;
    for (var i = 0; i < n; i++) {
      var arcH = 16 + i * 2;
      var p = document.createElementNS(NS, 'path');
      p.setAttribute('d', 'M ' + ax + ' -' + arcH + ' Q ' + (ax + bulge) + ' 0 ' + ax + ' ' + arcH);
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', '#343A40');
      p.setAttribute('stroke-width', '1.5');
      g.appendChild(p);

      var et = document.createElementNS(NS, 'text');
      et.setAttribute('x', ax + bulge + 2);
      et.setAttribute('y', 5);
      et.setAttribute('font-size', '12');
      et.setAttribute('fill', '#343A40');
      et.textContent = shells[i];
      g.appendChild(et);

      var nw = shells[i] >= 10 ? 14 : 8;
      ax += bulge + 2 + nw + 4;
    }

    var noteEl = document.createElementNS(NS, 'text');
    noteEl.setAttribute('x', 15);
    noteEl.setAttribute('y', 40);
    noteEl.setAttribute('text-anchor', 'middle');
    noteEl.setAttribute('font-size', '10');
    noteEl.setAttribute('font-weight', 'bold');
    noteEl.setAttribute('fill', '#E63946');
    noteEl.textContent = note;
    g.appendChild(noteEl);
  }

  var cells = document.querySelectorAll('.interactive-cell');
  for (var i = 0; i < cells.length; i++) {
    (function(cell) {
      function handler() {
        var txts = cell.querySelectorAll('text');
        var z = parseInt(txts[0].textContent);
        sel(z, cell);
      }
      cell.addEventListener('click', handler);
      cell.addEventListener('mouseenter', handler);
      cell.addEventListener('touchend', function(e) {
        e.preventDefault();
        handler();
      });
    })(cells[i]);
  }
})();
